document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

div>\n          <sc-if value=\"{{ currentHasGallery }}\">\n            <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:14px;\">\n              <sc-for list=\"{{ current.gallery }}\" as=\"g\" hint-placeholder-count=\"4\">\n                <div style=\"position:relative; aspect-ratio:16/10; border-radius:12px; overflow:hidden; background:{{ g.bg }}; border:1px solid rgba(120,160,220,.12);\">\n                  <div style=\"position:absolute; inset:0; display:grid; place-items:center; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.2em; color:rgba(255,255,255,.34);\">{{ g.label }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex; align-items:center; gap:12px; padding:18px 20px; border-radius:12px; background:rgba(255,255,255,.02); border:1px dashed rgba(120,160,220,.18); font-family:'Space Mono',monospace; font-size:12px; color:#7d8aa8; letter-spacing:.04em;\">More concept art &amp; screens coming soon.<\u002Fdiv>\n\n          <div style=\"font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:{{ current.accentHex }}; margin:42px 0 18px;\">Development Notes<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <sc-for list=\"{{ current.notes }}\" as=\"n\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; gap:14px; padding:16px 18px; border-radius:12px; background:rgba(255,255,255,.02); border:1px solid rgba(120,160,220,.12);\">\n                <span style=\"font-family:'Space Mono',monospace; font-size:11px; color:{{ current.accentHex }}; white-space:nowrap;\">{{ n.date }}<\u002Fspan>\n                <span style=\"font-size:14px; color:#c4cee2; line-height:1.55;\">{{ n.text }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <aside style=\"position:sticky; top:30px; display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"padding:22px; border-radius:16px; background:rgba(255,255,255,.025); border:1px solid rgba(120,160,220,.16);\">\n            <div style=\"font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#5e6b88; margin-bottom:16px;\">Get It / Back It<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{ current.links }}\" as=\"lk\" hint-placeholder-count=\"2\">\n                <a href=\"#\" onclick=\"{{ noop }}\" style=\"display:flex; align-items:center; justify-content:space-between; text-decoration:none; padding:13px 16px; border-radius:10px; background:{{ lk.bg }}; color:{{ lk.fg }}; font-weight:700; font-size:14px; border:1px solid {{ lk.bd }}; transition:transform .25s;\" style-hover=\"transform:translateY(-2px);\">{{ lk.label }} <span>→<\u002Fspan><\u002Fa>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"margin-top:20px; padding-top:18px; border-top:1px solid rgba(120,160,220,.12); display:flex; flex-direction:column; gap:11px;\">\n              <div style=\"display:flex; justify-content:space-between; font-size:13px;\"><span style=\"color:#5e6b88;\">Type<\u002Fspan><span style=\"color:#cfd8ec;\">{{ current.type }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-size:13px;\"><span style=\"color:#5e6b88;\">Status<\u002Fspan><span style=\"color:{{ current.accentHex }};\">{{ current.status }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-size:13px;\"><span style=\"color:#5e6b88;\">Studio<\u002Fspan><span style=\"color:#cfd8ec;\">King Panda<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:20px 22px; border-radius:16px; background:rgba(255,255,255,.02); border:1px solid rgba(120,160,220,.12);\">\n            <div style=\"font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#5e6b88; margin-bottom:12px;\">Related Media<\u002Fdiv>\n            <a href=\"#\" onclick=\"{{ noop }}\" style=\"display:flex; align-items:center; gap:12px; text-decoration:none; color:#c4cee2;\">\n              <span style=\"width:38px; height:38px; border-radius:9px; background:rgba(52,225,255,.1); border:1px solid rgba(52,225,255,.4); display:grid; place-items:center; color:#34e1ff;\">▶<\u002Fspan>\n              <span style=\"font-size:13px; line-height:1.4;\">Watch the {{ current.title }} devlog on YouTube<\u002Fspan>\n            <\u002Fa>\n          <\u002Fdiv>\n        <\u002Faside>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;studioName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;King Panda Studio&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;motionLevel&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:70,&quot;min&quot;:0,&quot;max&quot;:100,&quot;step&quot;:5,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;particleDensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:60,&quot;min&quot;:0,&quot;max&quot;:100,&quot;step&quot;:5,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;defaultCarousel&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;showcase&quot;,&quot;options&quot;:[&quot;showcase&quot;,&quot;posters&quot;,&quot;cinema&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Projects&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: 'home', selected: 0, variant: null };\n\n  get variant() { return this.state.variant || (this.props.defaultCarousel ?? 'showcase'); }\n\n  baseProjects() {\n    const C = '#34e1ff', G = '#ffce4d', M = '#ff5ce0';\n    const dark = 'radial-gradient(120% 120% at 50% 28%, #101a2d, #060912 78%)';\n    const light = 'radial-gradient(120% 120% at 50% 40%, #f7f5fc, #dfe5f1 92%)';\n    return [\n      { id:'nullified', title:'Nullified', type:'Comic Series', status:'Kickstarter', accent:G,\n        coverLabel:'NULLIFIED', img:'uploads/proj_nullified.png', fit:'cover', objPos:'50% 16%', pad:'0', plate:dark, lightPlate:false,\n        hook:'Reality has a delete key — and someone just found it.',\n        desc:['Nullified is the flagship comic of the King Panda universe — a dark fantasy where one reality-warping power threatens to unmake everything it touches.',\n              'Issue #1 is heading to Kickstarter. Full synopsis, preview pages, and backer tiers are on the way.'],\n        links:[{label:'Back on Kickstarter'},{label:'Read the Preview'}],\n        notes:[{date:'Now',text:'Kickstarter campaign for Issue #1 in preparation — first of an ongoing series.'}] },\n      { id:'aetherforge', title:'AetherForge', type:'Video Game', status:'In Dev', accent:C,\n        coverLabel:'AETHERFORGE', img:'uploads/proj_aetherforge.png', fit:'cover', objPos:'50% 50%', pad:'0', plate:dark, lightPlate:false,\n        hook:'Forge the impossible from raw aether in a world coming apart.',\n        desc:['AetherForge is an in-development action game set in a fractured world where survivors forge weapons and machines from raw aether energy.',\n              'The studio is building out the first playable vertical slice. Devlogs and screenshots coming soon.'],\n        links:[{label:'Follow Development'},{label:'Join the Discord'}],\n        notes:[{date:'In Dev',text:'Early concept and vertical-slice work underway at King Panda Studio.'}] },\n      { id:'mana-wars', title:'Mana Wars', type:'Video Game', status:'In Dev', accent:M,\n        coverLabel:'MANA WARS', img:'uploads/proj_manawars.png', fit:'contain', objPos:'50% 50%', pad:'9%', plate:light, lightPlate:true,\n        hook:'When mana becomes a weapon, every nation picks a side.',\n        desc:['Mana Wars is an in-development game about a world at war over the last reserves of mana — a clash of color, force, and fading magic.',\n              'Currently in early development. Wishlist and follow links will arrive with the first reveal.'],\n        links:[{label:'Follow Development'},{label:'Join the Discord'}],\n        notes:[{date:'In Dev',text:'Early development — world and systems design in progress.'}] },\n      { id:'dungeon-divers', title:'Dungeon Divers', type:'World Series', status:'In Dev', accent:G,\n        coverLabel:'DUNGEON DIVERS', img:'uploads/proj_dungeondivers.png', fit:'contain', objPos:'50% 50%', pad:'13%', plate:light, lightPlate:true,\n        hook:'Descend into a world that rewrites itself with every dive.',\n        desc:['Dungeon Divers is a growing world-series built around ever-shifting dungeons and the divers brave (or foolish) enough to map them.',\n              'In active development across multiple media. More to come.'],\n        links:[{label:'Follow Development'},{label:'Join the Discord'}],\n        notes:[{date:'In Dev',text:'Worldbuilding and design expanding across the Dungeon Divers series.'}] },\n      { id:'codex-rift', title:'Codex Rift', type:'Video Game', status:'In Dev', accent:C,\n        coverLabel:'CODEX RIFT', img:'uploads/proj_codexrift.png', fit:'cover', objPos:'50% 50%', pad:'0', plate:'radial-gradient(120% 120% at 55% 30%, #13283f, #070f1c 76%)', lightPlate:false,\n        hook:'A fracture in the Codex tears two worlds into one.',\n        desc:['Codex Rift is an in-development game set at the seam where two worlds collide — and the Codex that once kept them apart begins to fail.',\n              'Key art and details are in progress. Check back soon.'],\n        links:[{label:'Follow Development'},{label:'Join the Discord'}],\n        notes:[{date:'In Dev',text:'Concept stage — key art coming soon.'}] },\n      { id:'the-accused', title:'Occulos: The Accused', type:'Video Game', status:'In Dev', accent:C,\n        coverLabel:'THE ACCUSED', img:'uploads/proj_accused.png', fit:'cover', objPos:'50% 45%', pad:'0', plate:dark, lightPlate:false,\n        hook:'Wake in the chamber. You are guilty until you prove otherwise.',\n        desc:['Occulos: The Accused is an in-development narrative game that opens with you waking — alone and blamed — inside a sealed chamber of watching eyes.',\n              'A prototype build (v0.1) is taking shape. Follow the studio for the first look.'],\n        links:[{label:'Follow Development'},{label:'Join the Discord'}],\n        notes:[{date:'v0.1',text:'Prototype build in progress — first playable scene blocking out.'}] },\n    ];\n  }\n\n  statusStyle(s) {\n    if (s === 'In Dev') return { bg:'rgba(52,225,255,.14)', fg:'#34e1ff', bd:'rgba(52,225,255,.4)' };\n    if (s === 'Released') return { bg:'rgba(81,224,138,.14)', fg:'#51e08a', bd:'rgba(81,224,138,.4)' };\n    return { bg:'rgba(255,206,77,.14)', fg:'#ffce4d', bd:'rgba(255,206,77,.4)' };\n  }\n\n  accentRGB(hex) {\n    if (hex === '#ffce4d') return '255,206,77';\n    if (hex === '#ff5ce0') return '255,92,224';\n    return '52,225,255';\n  }\n\n  decorateProjects() {\n    return this.baseProjects().map((p, i) => {\n      const rgb = this.accentRGB(p.accent);\n      const st = this.statusStyle(p.status);\n      const grad = p.accent === '#ffce4d' ? '#ffce4d,#f0b62e' : p.accent === '#ff5ce0' ? '#ff5ce0,#d23bbf' : '#34e1ff,#1ab9da';\n      return Object.assign({}, p, {\n        accentHex: p.accent,\n        glow: 'rgba(' + rgb + ',.3)',\n        line: 'rgba(' + rgb + ',.45)',\n        statusBg: st.bg, statusFg: st.fg, statusBd: st.bd,\n        hasImg: !!p.img, noImg: !p.img,\n        imgStyle: 'object-fit:' + p.fit + '; object-position:' + p.objPos + '; padding:' + p.pad + ';',\n        open: () => this.openProject(i),\n        gallery: [],\n        links: p.links.map((lk, k) => k === 0\n          ? Object.assign({}, lk, { bg:'linear-gradient(120deg,' + grad + ')', fg:'#04121a', bd:'transparent' })\n          : Object.assign({}, lk, { bg:'rgba(255,255,255,.03)', fg:'#eef2fb', bd:'rgba(120,160,220,.25)' })),\n      });\n    });\n  }\n\n  openProject(i) {\n    if (this._suppressClick) return;\n    this.setState({ view: 'project', selected: i });\n    window.scrollTo({ top: 0 });\n  }\n  closeProject() {\n    this.setState({ view: 'home' });\n    // re-arm reveals for the page underneath\n    requestAnimationFrame(() => this.setupReveals(true));\n  }\n  setVariant(v) { this.setState({ variant: v }); }\n\n  scrollToId(id) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    const y = el.getBoundingClientRect().top + (window.scrollY || document.documentElement.scrollTop || 0) - 54;\n    window.scrollTo({ top: y, behavior: 'smooth' });\n  }\n  goHome() { window.scrollTo({ top: 0, behavior: 'smooth' }); }\n\n  scrollTrack(dir) {\n    const t = document.querySelector('[data-track]');\n    if (!t) return;\n    t.scrollBy({ left: dir * Math.min(t.clientWidth * 0.85, 540), behavior: 'smooth' });\n  }\n\n  // rAF tween (CSS transitions are unreliable in capture环境; rAF always runs)\n  tween(el, dur, dy, scaleFrom) {\n    if (!el || el._kpsAnim) return;\n    el._kpsAnim = true;\n    const start = performance.now();\n    const ease = (t) => 1 - Math.pow(1 - t, 3);\n    const tick = (now) => {\n      let t = (now - start) / dur;\n      if (t > 1) t = 1;\n      const e = ease(t);\n      el.style.opacity = String(e);\n      let tf = 'translateY(' + (dy * (1 - e)) + 'px)';\n      if (scaleFrom != null) tf += ' scale(' + (scaleFrom + (1 - scaleFrom) * e) + ')';\n      el.style.transform = tf;\n      if (t < 1) requestAnimationFrame(tick);\n      else { el.style.opacity = '1'; el.style.transform = 'none'; el._kpsDone = true; }\n    };\n    requestAnimationFrame(tick);\n  }\n\n  componentDidMount() {\n    this.heroEntrance();\n    this.setupReveals();\n    this.setupScroll();\n    this.setupDrag();\n    this.startParticles();\n    this.hydrateImages();\n    // safety net: reveal anything still hidden after 3.2s\n    this._safety = setTimeout(() => this.revealAll(), 3200);\n  }\n  componentDidUpdate() { this.hydrateImages(); }\n\n  // copy resolved data-dsrc URLs onto src (avoids fetching literal {{ }} during streaming)\n  hydrateImages() {\n    document.querySelectorAll('img[data-dsrc]').forEach((im) => {\n      const s = im.getAttribute('data-dsrc');\n      if (s && s.indexOf('{{') === -1 && im.getAttribute('src') !== s) im.setAttribute('src', s);\n    });\n  }\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf);\n    cancelAnimationFrame(this._inRaf);\n    clearTimeout(this._safety);\n    window.removeEventListener('scroll', this._onScroll, true);\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('pointermove', this._onMove);\n    window.removeEventListener('pointerup', this._onUp);\n    if (this._io) this._io.disconnect();\n  }\n\n  // Retry until the hero exists in the DOM (it may not yet during streaming), then tween it in.\n  heroEntrance(attempt) {\n    attempt = attempt || 0;\n    const hero = document.querySelector('[data-hero]');\n    const cue = document.querySelector('[data-hero-cue]');\n    if (hero) {\n      this.tween(hero, 1100, 26, 0.985);\n      setTimeout(() => { const c = document.querySelector('[data-hero-cue]'); if (c) this.tween(c, 700, 0, null); }, 700);\n      return;\n    }\n    if (attempt < 120) requestAnimationFrame(() => this.heroEntrance(attempt + 1));\n  }\n\n  revealAll() {\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      if (!el._kpsDone) { el.style.opacity = '1'; el.style.transform = 'none'; el._kpsDone = true; }\n    });\n    // never leave the hero invisible\n    document.querySelectorAll('[data-hero], [data-hero-cue]').forEach((el) => {\n      if (!el._kpsDone) { el.style.opacity = '1'; el.style.transform = 'none'; el._kpsDone = true; }\n    });\n  }\n\n  setupReveals(reobserve) {\n    if (!this._io) {\n      this._io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            this.tween(e.target, 900, 32, null);\n            this._io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.1, rootMargin: '0px 0px -5% 0px' });\n    }\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      if (el._kpsDone || el._kpsObs) return;\n      el._kpsObs = true;\n      // already in view on load → reveal immediately\n      const r = el.getBoundingClientRect();\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      if (r.top < vh * 0.92 && r.bottom > 0) this.tween(el, 900, 32, null);\n      else this._io.observe(el);\n    });\n  }\n\n  setupScroll() {\n    const apply = () => {\n      const y = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;\n      const nav = document.querySelector('[data-nav]');\n      if (nav) {\n        if (y > 30) { nav.style.background = 'rgba(5,7,15,.82)'; nav.style.backdropFilter = 'blur(14px)'; nav.style.webkitBackdropFilter = 'blur(14px)'; nav.style.borderBottomColor = 'rgba(120,160,220,.14)'; }\n        else { nav.style.background = 'transparent'; nav.style.backdropFilter = 'none'; nav.style.webkitBackdropFilter = 'none'; nav.style.borderBottomColor = 'rgba(120,160,220,0)'; }\n      }\n      document.querySelectorAll('[data-parallax]').forEach((el) => {\n        const sp = parseFloat(el.getAttribute('data-speed') || '0.2');\n        el.style.transform = 'translateY(' + (y * sp * -1) + 'px)';\n      });\n    };\n    let ticking = false;\n    this._onScroll = () => {\n      if (ticking) return;\n      ticking = true;\n      requestAnimationFrame(() => { apply(); ticking = false; });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true, capture: true });\n    apply();\n  }\n\n  setupDrag() {\n    this._drag = { active: false, startX: 0, startScroll: 0, lastX: 0, vx: 0, moved: false, track: null };\n    const onDown = (e) => {\n      const t = e.target.closest('[data-track]');\n      if (!t) return;\n      const d = this._drag;\n      d.active = true; d.track = t; d.startX = e.clientX; d.startScroll = t.scrollLeft;\n      d.lastX = e.clientX; d.vx = 0; d.moved = false;\n      this._inertiaStop = true;\n      t.style.cursor = 'grabbing';\n    };\n    this._onMove = (e) => {\n      const d = this._drag;\n      if (!d.active) return;\n      const dx = e.clientX - d.startX;\n      if (Math.abs(dx) > 6) d.moved = true;\n      d.track.scrollLeft = d.startScroll - dx;\n      d.vx = e.clientX - d.lastX;\n      d.lastX = e.clientX;\n    };\n    this._onUp = () => {\n      const d = this._drag;\n      if (!d.active) return;\n      d.active = false;\n      if (d.track) d.track.style.cursor = 'grab';\n      if (d.moved) {\n        this._suppressClick = true;\n        setTimeout(() => { this._suppressClick = false; }, 60);\n        this.inertia(d.track, d.vx);\n      }\n    };\n    document.addEventListener('pointerdown', onDown);\n    window.addEventListener('pointermove', this._onMove);\n    window.addEventListener('pointerup', this._onUp);\n  }\n  inertia(track, vx) {\n    let v = vx;\n    this._inertiaStop = false;\n    const step = () => {\n      if (this._inertiaStop) return;\n      v *= 0.93;\n      track.scrollLeft -= v;\n      if (Math.abs(v) > 0.4) this._inRaf = requestAnimationFrame(step);\n    };\n    if (Math.abs(v) > 0.4) step();\n  }\n\n  startParticles() {\n    const motion = this.props.motionLevel ?? 70;\n    const density = this.props.particleDensity ?? 60;\n    const canvas = this.canvasRef && this.canvasRef.current;\n    if (!canvas || motion <= 0) return;\n    const ctx = canvas.getContext('2d');\n    let w = 0, h = 0, dpr = 1;\n    const resize = () => {\n      dpr = Math.min(window.devicePixelRatio || 1, 2);\n      const r = canvas.getBoundingClientRect();\n      w = r.width; h = r.height;\n      canvas.width = Math.max(1, w * dpr); canvas.height = Math.max(1, h * dpr);\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    };\n    resize();\n    this._onResize = resize;\n    window.addEventListener('resize', this._onResize);\n\n    const count = Math.round((20 + (density / 100) * 120) * (motion / 70));\n    const speed = motion / 70;\n    const P = [];\n    for (let i = 0; i < count; i++) {\n      P.push({\n        x: Math.random() * w, y: Math.random() * h,\n        r: Math.random() * 2 + 0.5,\n        vy: -(Math.random() * 0.25 + 0.06) * speed,\n        vx: (Math.random() - 0.5) * 0.12 * speed,\n        a: Math.random() * 0.5 + 0.15,\n        gold: Math.random() < 0.32,\n        ph: Math.random() * Math.PI * 2,\n      });\n    }\n    const draw = () => {\n      if (w && h) {\n        ctx.clearRect(0, 0, w, h);\n        ctx.globalCompositeOperation = 'lighter';\n        for (let i = 0; i < P.length; i++) {\n          const p = P[i];\n          p.ph += 0.01;\n          p.y += p.vy;\n          p.x += p.vx + Math.sin(p.ph) * 0.12;\n          if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }\n          if (p.x < -10) p.x = w + 10; else if (p.x > w + 10) p.x = -10;\n          const col = p.gold ? '255,206,77' : '52,225,255';\n          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 6);\n          g.addColorStop(0, 'rgba(' + col + ',' + p.a + ')');\n          g.addColorStop(1, 'rgba(' + col + ',0)');\n          ctx.fillStyle = g;\n          ctx.beginPath();\n          ctx.arc(p.x, p.y, p.r * 6, 0, Math.PI * 2);\n          ctx.fill();\n        }\n        ctx.globalCompositeOperation = 'source-over';\n      }\n      this._raf = requestAnimationFrame(draw);\n    };\n    draw();\n  }\n\n  renderVals() {\n    const projects = this.dec
